name: Runbook Guard V2

on:
  workflow_dispatch:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: runbook-guard-v2-showcase-${{ github.ref }}
  cancel-in-progress: true

jobs:
  structure_guard:
    name: 00 / Structure Guard
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check root structure
        shell: bash
        run: |
          set -euo pipefail

          required=(
            "README.md"
            "runbook.md"
            "inputs"
            "checks"
            "frameworks"
            "outputs"
            "reviews"
            "cases"
            "prompts"
            "archive"
            ".github"
          )

          missing=0
          for path in "${required[@]}"; do
            if [ ! -e "$path" ]; then
              echo "Missing required path: $path"
              missing=1
            fi
          done

          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Check runbook and showcase README chain
        shell: bash
        run: |
          set -euo pipefail

          grep -Fq "inputs/" runbook.md
          grep -Fq "checks/" runbook.md
          grep -Fq "frameworks/" runbook.md
          grep -Fq "outputs/" runbook.md
          grep -Fq "reviews/" runbook.md
          grep -Fq "cases/" runbook.md
          grep -Fq "prompts/" runbook.md

          grep -Fq "让方案设计，不再靠人硬顶" README.md
          grep -Fq "试运行说明" README.md
          grep -Fq "合作方式" README.md
          grep -Fq "联系方式 / 合作联系" README.md

      - name: Check trial interface files
        shell: bash
        run: |
          set -euo pipefail

          required=(
            ".github/ISSUE_TEMPLATE/config.yml"
            ".github/ISSUE_TEMPLATE/input-request.yml"
            ".github/ISSUE_TEMPLATE/bug-report.yml"
            ".github/ISSUE_TEMPLATE/feature-request.yml"
          )

          for path in "${required[@]}"; do
            test -f "$path"
          done

      - name: Write structure summary
        shell: bash
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" <<'EOF'
          ## Structure Guard
          - Showcase root skeleton exists.
          - `runbook.md` contains the main workflow chain.
          - `README.md` keeps the public showcase positioning and trial entry.
          - Issue templates for trial input, bug report and structure request exist.
          - This workflow checks structure and process alignment. It does not replace human judgment.
          EOF

  input_stage:
    name: 01 / Input Stage
    runs-on: ubuntu-latest
    needs: structure_guard
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate inputs module and condition fields
        shell: bash
        run: |
          set -euo pipefail

          required=(
            "inputs/README.md"
            "inputs/template-v2.md"
          )

          for path in "${required[@]}"; do
            test -f "$path"
          done

          grep -Fq "## 模块定位" inputs/README.md
          grep -Fq "## 本模块输出" inputs/README.md
          grep -Fq "### E. 条件输入数据" inputs/README.md
          grep -Fq "### F. 已确认条件" inputs/README.md
          grep -Fq "### G. 待确认条件" inputs/README.md

          grep -Fq "## A. 需求重点" inputs/template-v2.md
          grep -Fq "## B. 缺失字段" inputs/template-v2.md
          grep -Fq "## C. 信息冲突" inputs/template-v2.md
          grep -Fq "## D. 补充提问清单" inputs/template-v2.md
          grep -Fq "## E. 条件输入数据" inputs/template-v2.md
          grep -Fq "## F. 已确认条件" inputs/template-v2.md
          grep -Fq "## G. 待确认条件" inputs/template-v2.md

      - name: Write input summary
        shell: bash
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" <<'EOF'
          ## Input Stage
          - Input module exists.
          - Input candidate template keeps A-G structure.
          - Condition fields, confirmed conditions and pending conditions are guarded.
          EOF

  check_stage:
    name: 02 / Check Stage
    runs-on: ubuntu-latest
    needs: input_stage
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate checks module and gate fields
        shell: bash
        run: |
          set -euo pipefail

          required=(
            "checks/README.md"
            "checks/checklist-v2.md"
          )

          for path in "${required[@]}"; do
            test -f "$path"
          done

          grep -Fq "## 核心任务" checks/README.md
          grep -Fq "## 检查范围" checks/README.md
          grep -Fq "## 本模块输出" checks/README.md
          grep -Fq "### F. 条件放行检查" checks/README.md
          grep -Fq "### G. 人工关口决策" checks/README.md
          grep -Fq "### H. 放行条件" checks/README.md
          grep -Fq "### I. 阻塞条件" checks/README.md

          grep -Fq "## A. Checklist 对照结果" checks/checklist-v2.md
          grep -Fq "## B. 缺项清单" checks/checklist-v2.md
          grep -Fq "## C. 风险提示" checks/checklist-v2.md
          grep -Fq "## D. 需人工确认的冲突点" checks/checklist-v2.md
          grep -Fq "## E. 逻辑一致性与责任归位判断" checks/checklist-v2.md
          grep -Fq "## F. 放行条件" checks/checklist-v2.md
          grep -Fq "## G. 阻塞条件" checks/checklist-v2.md
          grep -Fq "## H. 人工关口记录" checks/checklist-v2.md

      - name: Write check summary
        shell: bash
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" <<'EOF'
          ## Check Stage
          - Check module exists.
          - Candidate checklist keeps completeness, conflict, risk, release and gate fields.
          - Manual node reminder: after this stage, the runbook still requires human supplementation and correction before continuing.
          EOF

  framework_stage:
    name: 03 / Framework Stage
    runs-on: ubuntu-latest
    needs: check_stage
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate frameworks module
        shell: bash
        run: |
          set -euo pipefail

          required=(
            "frameworks/README.md"
            "frameworks/mother-dimensions.md"
            "frameworks/structure-template.md"
          )

          for path in "${required[@]}"; do
            test -f "$path"
          done

          grep -Fq "## 标准处理流程" frameworks/README.md
          grep -Fq "## 本模块输出" frameworks/README.md

          grep -Fq "## 1. 目标层" frameworks/mother-dimensions.md
          grep -Fq "## 8. 产出层" frameworks/mother-dimensions.md

          grep -Fq "## 一、母维度拆解" frameworks/structure-template.md
          grep -Fq "## 二、结构框架" frameworks/structure-template.md
          grep -Fq "### 4. 权责接口" frameworks/structure-template.md
          grep -Fq "### 5. 风险节点" frameworks/structure-template.md
          grep -Fq "### 6. 时间安排" frameworks/structure-template.md

      - name: Write framework summary
        shell: bash
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" <<'EOF'
          ## Framework Stage
          - Framework module exists.
          - Eight mother dimensions are present.
          - Structure template contains path, responsibility, risk and time arrangement.
          EOF

  output_stage:
    name: 04 / Output Stage
    runs-on: ubuntu-latest
    needs: framework_stage
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate outputs module
        shell: bash
        run: |
          set -euo pipefail

          required=(
            "outputs/README.md"
            "outputs/proposal-template.md"
          )

          for path in "${required[@]}"; do
            test -f "$path"
          done

          grep -Fq "## 核心要求" outputs/README.md
          grep -Fq "## 标准处理流程" outputs/README.md

          grep -Fq "## 1. 项目背景" outputs/proposal-template.md
          grep -Fq "## 5. 执行步骤" outputs/proposal-template.md
          grep -Fq "## 8. 风险预警" outputs/proposal-template.md
          grep -Fq "## 10. 结果指标" outputs/proposal-template.md
          grep -Fq "## 11. 复盘方式" outputs/proposal-template.md

      - name: Write output summary
        shell: bash
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" <<'EOF'
          ## Output Stage
          - Output module exists.
          - Proposal template covers decision, execution and review fields.
          - Manual node reminder: after output, the runbook requires comparison with `cases/` and manual judgment on case classification.
          EOF

  review_stage:
    name: 05 / Review Stage
    runs-on: ubuntu-latest
    needs: output_stage
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate reviews module
        shell: bash
        run: |
          set -euo pipefail

          required=(
            "reviews/README.md"
            "reviews/rollback-rules.md"
          )

          for path in "${required[@]}"; do
            test -f "$path"
          done

          grep -Fq "## 核心判断" reviews/README.md
          grep -Fq "## 本模块输出" reviews/README.md

          grep -Fq "## 1. 输入模板问题" reviews/rollback-rules.md
          grep -Fq "## 2. 校验节点问题" reviews/rollback-rules.md
          grep -Fq "## 3. 拆解维度问题" reviews/rollback-rules.md
          grep -Fq "## 4. 框架模板问题" reviews/rollback-rules.md
          grep -Fq "## 5. 输出格式问题" reviews/rollback-rules.md
          grep -Fq "## 6. 审核机制问题" reviews/rollback-rules.md

      - name: Write review summary
        shell: bash
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" <<'EOF'
          ## Review Stage
          - Review module exists.
          - Rollback rules are present and mapped to specific layers.
          EOF

  case_stage:
    name: 06 / Case Stage
    runs-on: ubuntu-latest
    needs: review_stage
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate cases and prompts modules
        shell: bash
        run: |
          set -euo pipefail

          required=(
            "cases/README.md"
            "prompts/README.md"
            "prompts/pr-prompts.md"
          )

          for path in "${required[@]}"; do
            test -f "$path"
          done

          grep -Fq "## 标准处理流程" cases/README.md
          grep -Fq "## 文件说明" cases/README.md

          grep -Fq "## 提示词分类" prompts/README.md
          grep -Fq "## 提示词编写原则" prompts/README.md
          grep -Fq "## Prompt 1：标准 PR 说明" prompts/pr-prompts.md

          optional_paths=(
            "cases/templates"
            "cases/success"
            "cases/failed"
          )

          for path in "${optional_paths[@]}"; do
            if [ ! -e "$path" ]; then
              echo "::warning::Optional case path not found: $path"
            fi
          done

      - name: Write case summary
        shell: bash
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" <<'EOF'
          ## Case Stage
          - Case and prompt modules exist.
          - Prompt layer remains an interface layer, not the final authority.
          - Optional case folders are available for showcase trial accumulation.
          EOF

  runbook_summary:
    name: 07 / Runbook Summary
    runs-on: ubuntu-latest
    needs:
      - structure_guard
      - input_stage
      - check_stage
      - framework_stage
      - output_stage
      - review_stage
      - case_stage
    if: always()
    steps:
      - name: Write final summary
        shell: bash
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" <<'EOF'
          ## Final Summary
          This showcase workflow follows the repository runbook as a guardrail:

          1. inputs/
          2. checks/
          3. manual supplementation and correction
          4. frameworks/
          5. outputs/
          6. compare with cases/
          7. manual judgment and case classification correction
          8. reviews/
          9. prompts/
          10. cases/

          Showcase trial additions:
          - Keep the public product homepage in `README.md`.
          - Add `Trial Input Request` for customers to test via issues.
          - Keep the mother repo core architecture while exposing a lighter test carrier.

          Boundaries:
          - AI checks structure and process alignment.
          - Human keeps final judgment.
          - This workflow validates whether the showcase repository still carries that division of labor.
          EOF