name: Trial Input Request
description: 用结构化方式提交试运行测试需求，便于按 inputs/ → checks/ → frameworks/ 主链进入展示仓工作流
title: "[TRIAL INPUT] "
body:
  - type: markdown
    attributes:
      value: |
        ## Trial Input Request

        这个表单用于在展示仓里提交 **试运行测试需求**。

        目标不是直接让系统跳到最终方案，
        而是先把需求整理为可进入 `inputs/` 的结构化输入。

  - type: input
    id: request_title
    attributes:
      label: 需求标题
      description: 用一句话概括这次测试需求。
      placeholder: 例：为某品牌线下试点活动设计一版方案流程
    validations:
      required: true

  - type: textarea
    id: core_goal
    attributes:
      label: 核心目标
      description: 这次需求最想解决什么问题。
      placeholder: 例：降低活动方案返工次数，并先跑通试点版本。
    validations:
      required: true

  - type: input
    id: target_object
    attributes:
      label: 目标对象
      description: 这次方案主要服务谁或影响谁。
      placeholder: 例：门店团队 / 运营团队 / 顾问项目客户
    validations:
      required: true

  - type: textarea
    id: business_scene
    attributes:
      label: 业务场景
      description: 简述当前场景、背景和触发原因。
      placeholder: 例：客户希望把线下活动方案固定成可复用流程，避免每次重写。
    validations:
      required: true

  - type: textarea
    id: expected_result
    attributes:
      label: 预期结果
      description: 你理想中希望得到什么结果。
      placeholder: 例：得到一版结构清晰、可执行、可复盘的试运行方案骨架。
    validations:
      required: true

  - type: input
    id: time_requirement
    attributes:
      label: 时间要求
      description: 是否有明确时间节点。
      placeholder: 例：5月试运行前 / 无硬性时间要求
    validations:
      required: false

  - type: textarea
    id: key_constraints
    attributes:
      label: 关键约束
      description: 写出预算、范围、权限、资源、组织限制等关键条件。
      placeholder: 例：只允许试点；预算不超过 30 万；不改现有组织结构。
    validations:
      required: false

  - type: textarea
    id: success_standard
    attributes:
      label: 成功标准
      description: 你如何判断这次试运行是有效的。
      placeholder: 例：流程能跑通；工作流不报错；产出结构完整；客户能看懂并试用。
    validations:
      required: false

  - type: textarea
    id: current_materials
    attributes:
      label: 当前已有材料
      description: 粘贴你已经有的需求、文档、聊天摘要或其它上下文。
      placeholder: 例：会议纪要、需求简报、历史方案、客户聊天记录。
    validations:
      required: false

  - type: textarea
    id: biggest_risk
    attributes:
      label: 当前最担心的问题
      description: 哪个问题最可能导致本次试运行失败。
      placeholder: 例：信息缺失太多；目标不统一；责任边界不清；时间口径冲突。
    validations:
      required: false

  - type: checkboxes
    id: trial_boundary
    attributes:
      label: 试运行边界确认
      description: 确认这次提交遵循展示仓的试运行边界。
      options:
        - label: 我确认这是试运行测试需求，不要求系统跳过人工节点直接拍板
          required: true
        - label: 我确认展示仓当前主要用于验证工作流是否可跑通
          required: true
        - label: 我确认必要时仍需人工补充条件、修正判断和止损
          required: true

  - type: markdown
    attributes:
      value: |
        ---

        提交后，这条需求应优先进入 `inputs/`，再按 `checks/ → frameworks/ → outputs/` 主链逐步推进。 
