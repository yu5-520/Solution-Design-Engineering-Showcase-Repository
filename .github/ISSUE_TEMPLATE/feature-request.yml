name: Structure Feature Request
description: 用结构化方式提交新增模块、模板、检查点、提示词或工作流升级请求
title: "[FEATURE] "
body:
  - type: markdown
    attributes:
      value: |
        ## Structure Feature Request

        这个表单用于提交“结构升级请求”，而不是普通想法留言。

        它适用于：
        - 新增模块
        - 新增模板
        - 新增检查点
        - 新增案例沉淀结构
        - 新增提示词接口
        - 调整 runbook / workflow / issue / PR 协作骨架

        目标不是直接跳到结果层，而是判断：
        **这项新增内容应该落到哪一层、服务哪段主链路、如何验证它真的提升了系统承载。**

  - type: textarea
    id: feature_summary
    attributes:
      label: 升级请求概述
      description: 你想新增或改造什么。
      placeholder: 例：新增一个专门处理“案例标签归类”的模板；新增一个检查点用于识别责任空白。
    validations:
      required: true

  - type: dropdown
    id: target_layer
    attributes:
      label: 主要落到哪一层
      description: 选择这次升级主要影响的层级。
      options:
        - inputs/
        - checks/
        - frameworks/
        - outputs/
        - reviews/
        - cases/
        - prompts/
        - runbook.md
        - .github/
    validations:
      required: true

  - type: dropdown
    id: feature_type
    attributes:
      label: 升级类型
      description: 选择最接近这次请求的类型。
      options:
        - 新增模块
        - 新增模板
        - 新增检查点
        - 新增提示词
        - 新增案例结构
        - 新增协作工作流
        - 调整现有结构
        - 其它
    validations:
      required: true

  - type: textarea
    id: current_problem
    attributes:
      label: 当前问题
      description: 为什么现在必须做这次升级，不做会出现什么问题。
      placeholder: 例：现有 checks/ 无法稳定暴露责任空白，导致问题只能在 outputs/ 才暴露。
    validations:
      required: true

  - type: textarea
    id: expected_improvement
    attributes:
      label: 预期提升
      description: 这次升级完成后，系统哪部分承载会变强。
      placeholder: 例：让问题更早暴露；减少重复返工；提高案例回流效率；让 AI 协作接口更稳定。
    validations:
      required: true

  - type: textarea
    id: affected_workflow
    attributes:
      label: 影响的主链路
      description: 说明它会影响哪一段流程。
      placeholder: |
        例：
        inputs/ → checks/
        或
        outputs/ → 对照 cases/ → reviews/
    validations:
      required: false

  - type: textarea
    id: proposed_design
    attributes:
      label: 初步设计
      description: 写出你设想的结构、字段、模块、节点或文件形式。
      placeholder: 例：在 checks/ 下新增一个 responsibility-gaps.md；或在 prompts/ 下新增 case-classification-prompts.md。
    validations:
      required: false

  - type: textarea
    id: alternatives_considered
    attributes:
      label: 已考虑过的替代方案
      description: 如果你已经想过别的做法，也写出来。
      placeholder: 例：也考虑过直接改 outputs/ 模板，但那样问题暴露太晚。
    validations:
      required: false

  - type: textarea
    id: risks_and_costs
    attributes:
      label: 风险与代价
      description: 这次升级可能引入什么负担、误导或复杂度。
      placeholder: 例：结构更重、字段过多、误导为 AI 自动拍板、增加维护成本。
    validations:
      required: false

  - type: textarea
    id: validation_method
    attributes:
      label: 验证方式
      description: 你打算如何判断这次升级是有效的。
      placeholder: 例：用 2 个真实案例跑通；检查是否减少回退次数；确认工作流仍符合 runbook.md。
    validations:
      required: true

  - type: dropdown
    id: related_rollback_layer
    attributes:
      label: 若升级失败，优先回退到哪一层
      description: 先给出一个预估回退层级。
      options:
        - inputs/
        - checks/
        - frameworks/
        - outputs/
        - reviews/
        - cases/
        - prompts/
        - runbook.md
        - .github/
        - 暂不确定
    validations:
      required: true

  - type: checkboxes
    id: boundary_confirmation
    attributes:
      label: 边界确认
      description: 确认该升级请求仍遵循仓库的人机边界。
      options:
        - label: 我确认这次升级不是为了让 AI 跳过人工判断节点直接拍板
          required: true
        - label: 我确认这次升级是为了增强系统承载，而不是单纯堆叠结构
          required: true
        - label: 我确认必要时应能回退到具体层级修正
          required: true

  - type: textarea
    id: references
    attributes:
      label: 参考材料
      description: 可附上相关 issue、PR、案例、文档或日志。
      placeholder: 粘贴 issue / PR / 案例 / 文档链接。
    validations:
      required: false

  - type: markdown
    attributes:
      value: |
        ---

        提交后，这条请求应优先被视为“结构升级输入”，并结合 `reviews/`、`cases/`、`prompts/` 与 `runbook.md` 判断是否值得纳入母仓。 
